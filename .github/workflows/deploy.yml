name: Deploy Flutter Web (Pages)

on:
  push:
    branches: [ main ]
    paths:
      - "lib/**"
      - "web/**"
      - "pubspec.yaml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Flutter web (2025): default build => CanvasKit (no existe "html renderer" en stable actual).
      # Si querés experimentar con skwasm: agregá --wasm (y probás en Safari).
      - name: Build (release, no PWA, base-href)
        run: flutter build web --release --base-href "/bitacora_web/" --pwa-strategy=none --no-wasm-dry-run

      - name: Stamp BUILD_ID + 404.html + nojekyll
        shell: bash
        run: |
          set -euo pipefail
          stamp="$(date +%Y%m%d_%H%M%S)_${GITHUB_SHA::7}"
          echo "BUILD_ID=$stamp"

          # Reemplaza SOLO el content del meta (no toques el '__BUILD_ID__' del JS)
          sed -i "s/content=\"__BUILD_ID__\"/content=\"$stamp\"/g" build/web/index.html

          # SPA fallback
          cp build/web/index.html build/web/404.html

          # Evita Jekyll
          touch build/web/.nojekyll

          echo "== sanity =="
          grep -n 'meta name="bitflow-build"' build/web/index.html || true

          # Si queda el placeholder en el META, fallá (pero permitimos que el JS tenga '__BUILD_ID__')
          if grep -n '<meta name="bitflow-build" content="__BUILD_ID__"' build/web/index.html; then
            echo "ERROR: El META quedó sin stamp (__BUILD_ID__)."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
