name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter test
        run: flutter test

      - name: Flutter analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          version_raw="$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}')"
          version_raw="${version_raw//[^0-9A-Za-z._+-]/-}"
          semver="${version_raw%%+*}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            build_id="${GITHUB_REF_NAME}"
          else
            build_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          fi
          echo "raw=$version_raw" >> "$GITHUB_OUTPUT"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

      - name: Build Android APK (release)
        run: |
          flutter build apk --release \
            --dart-define=BUILD_ID=${{ steps.app_version.outputs.build_id }}

      - name: Stage dist artifact
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/BitFlow-android.apk"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            cp build/app/outputs/flutter-apk/app-release.apk "dist/BitFlow-android-${GITHUB_REF_NAME}.apk"
          fi

      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bitflow-android-apk
          path: dist/BitFlow-android.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: BitFlow ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/BitFlow-android.apk
            dist/BitFlow-android-${{ github.ref_name }}.apk

      - name: Verify stable APK URL
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          stable_url="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/BitFlow-android.apk"
          echo "Checking ${stable_url}"
          ok="false"
          for i in 1 2 3 4 5; do
            status="$(curl -L -I -s -o /dev/null -w "%{http_code}" "${stable_url}")"
            echo "Attempt ${i}: HTTP ${status}"
            if [[ "${status}" == "200" || "${status}" == "302" ]]; then
              ok="true"
              break
            fi
            sleep 8
          done
          if [[ "${ok}" != "true" ]]; then
            echo "Stable APK URL did not become available in time."
            exit 1
          fi
