name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter test
        run: flutter test

      - name: Flutter analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          version_raw="$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}')"
          version_raw="${version_raw//[^0-9A-Za-z._+-]/-}"
          semver="${version_raw%%+*}"
          release_tag="v${semver}"
          build_id="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "raw=$version_raw" >> "$GITHUB_OUTPUT"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: release_notes
        shell: bash
        run: |
          if [[ -f CHANGELOG.md ]]; then
            notes="$(awk 'BEGIN{capture=0} /^## \[/{if(capture==1) exit; capture=1} capture{print}' CHANGELOG.md)"
            if [[ -n "${notes// }" ]]; then
              {
                echo "body<<EOF"
                echo "$notes"
                echo ""
                echo "- APK estable: https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/BitFlow-android.apk"
                echo "EOF"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          {
            echo "body<<EOF"
            echo "Release ${GITHUB_SHA}"
            echo ""
            echo "- APK estable: https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/BitFlow-android.apk"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build Android APK (release)
        run: |
          flutter build apk --release \
            --dart-define=BUILD_ID=${{ steps.app_version.outputs.build_id }}

      - name: Stage dist artifact
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/BitFlow-android.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/BitFlow-android-${{ steps.app_version.outputs.release_tag }}.apk"

      - name: Upload APK artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bitflow-android-apk
          path: dist/BitFlow-android.apk
          if-no-files-found: error

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.release_tag }}
          name: BitFlow ${{ steps.app_version.outputs.release_tag }}
          body: ${{ steps.release_notes.outputs.body }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/BitFlow-android.apk
            dist/BitFlow-android-${{ steps.app_version.outputs.release_tag }}.apk

      - name: Verify stable APK URL
        shell: bash
        run: |
          stable_url="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/BitFlow-android.apk"
          echo "Checking ${stable_url}"
          ok="false"
          for i in 1 2 3 4 5; do
            status="$(curl -L -I -s -o /dev/null -w "%{http_code}" "${stable_url}")"
            echo "Attempt ${i}: HTTP ${status}"
            if [[ "${status}" == "200" || "${status}" == "302" ]]; then
              ok="true"
              break
            fi
            sleep 8
          done
          if [[ "${ok}" != "true" ]]; then
            echo "Stable APK URL did not become available in time."
            exit 1
          fi
