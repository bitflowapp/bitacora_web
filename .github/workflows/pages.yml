name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FLUTTER_VERSION: 3.35.6
  # Override from repo/org variable BASE_HREF when needed (for user pages use "/").
  BASE_HREF: ${{ vars.BASE_HREF || '/bitacora_web/' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve Dart binary from Flutter SDK
        run: echo "DART_BIN=$FLUTTER_ROOT/bin/cache/dart-sdk/bin/dart" >> "$GITHUB_ENV"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Flutter version
        run: flutter --version

      - name: Flutter pub get
        run: flutter pub get

      - name: Format check
        run: "$DART_BIN" format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Resolve app version
        id: app_version
        run: |
          version_raw="$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}')"
          semver="${version_raw%%+*}"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"

      - name: Write version.json
        env:
          ENGINE_BASE_URL: ${{ vars.ENGINE_BASE_URL }}
        run: |
          build_time="$(date -u +'%Y-%m-%d %H:%M')"
          mkdir -p web/assets
          echo "{\"buildId\":\"${{ github.run_id }}-${{ github.run_attempt }}\",\"appVersion\":\"${{ steps.app_version.outputs.semver }}\",\"gitSha\":\"${{ github.sha }}\",\"buildTime\":\"${build_time}\",\"engineBaseUrl\":\"${ENGINE_BASE_URL}\"}" > assets/version.json
          echo "{\"buildId\":\"${{ github.run_id }}-${{ github.run_attempt }}\",\"appVersion\":\"${{ steps.app_version.outputs.semver }}\",\"gitSha\":\"${{ github.sha }}\",\"buildTime\":\"${build_time}\",\"engineBaseUrl\":\"${ENGINE_BASE_URL}\"}" > web/version.json
          echo "{\"buildId\":\"${{ github.run_id }}-${{ github.run_attempt }}\",\"appVersion\":\"${{ steps.app_version.outputs.semver }}\",\"gitSha\":\"${{ github.sha }}\",\"buildTime\":\"${build_time}\",\"engineBaseUrl\":\"${ENGINE_BASE_URL}\"}" > web/assets/version.json

      - name: Build web
        run: |
          echo "Using BASE_HREF=${{ env.BASE_HREF }}"
          flutter build web --release \
            --base-href "${{ env.BASE_HREF }}" \
            --dart-define=BITFLOW_AUTH=false \
            --dart-define=ENGINE_BASE_URL=${{ vars.ENGINE_BASE_URL }} \
            --dart-define=GIT_SHA=${{ github.sha }}

      - name: Include BitFlow landing in artifact
        run: |
          mkdir -p build/web/bitflow
          cp -R docs/bitflow/. build/web/bitflow/
          test -f build/web/index.html
          test -f build/web/bitflow/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
