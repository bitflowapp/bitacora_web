name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze (RC mode)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release
