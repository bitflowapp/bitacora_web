name: Deploy to GitHub Pages (project)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

env:
  FLUTTER_CHANNEL: stable
  BASE_HREF: /bitacora_web/

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter version
        run: flutter --version

      - name: Flutter pub get
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Test
        run: flutter test

      - name: Set build stamp
        run: echo "BUILD_TIME=$(date -u +'%Y-%m-%d %H:%M')" >> "$GITHUB_ENV"

      - name: Resolve app version
        id: app_version
        run: |
          version_raw="$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}')"
          semver="${version_raw%%+*}"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"

      - name: Write version.json
        env:
          ENGINE_BASE_URL: ${{ vars.ENGINE_BASE_URL }}
        run: |
          mkdir -p web/assets
          echo "{\"buildId\":\"${{ github.run_id }}-${{ github.run_attempt }}\",\"appVersion\":\"${{ steps.app_version.outputs.semver }}\",\"gitSha\":\"${{ github.sha }}\",\"buildTime\":\"${{ env.BUILD_TIME }}\",\"engineBaseUrl\":\"${ENGINE_BASE_URL}\"}" > assets/version.json
          echo "{\"buildId\":\"${{ github.run_id }}-${{ github.run_attempt }}\",\"appVersion\":\"${{ steps.app_version.outputs.semver }}\",\"gitSha\":\"${{ github.sha }}\",\"buildTime\":\"${{ env.BUILD_TIME }}\",\"engineBaseUrl\":\"${ENGINE_BASE_URL}\"}" > web/version.json
          echo "{\"buildId\":\"${{ github.run_id }}-${{ github.run_attempt }}\",\"appVersion\":\"${{ steps.app_version.outputs.semver }}\",\"gitSha\":\"${{ github.sha }}\",\"buildTime\":\"${{ env.BUILD_TIME }}\",\"engineBaseUrl\":\"${ENGINE_BASE_URL}\"}" > web/assets/version.json

      - name: Build web
        run: |
          flutter build web --release --base-href "/bitacora_web/" \
            --dart-define=BUILD_ID=${{ github.run_id }}-${{ github.run_attempt }} \
            --dart-define=ENGINE_BASE_URL=${{ vars.ENGINE_BASE_URL }} \
            --dart-define=GIT_SHA=${{ github.sha }} \
            --dart-define=BUILD_TIME="${{ env.BUILD_TIME }}"

      - name: Include BitFlow landing in artifact
        run: |
          mkdir -p build/web/bitflow
          cp -R docs/bitflow/. build/web/bitflow/
          test -f build/web/index.html
          test -f build/web/bitflow/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: build/web
          force_orphan: true
