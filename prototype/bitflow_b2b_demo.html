<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A2540" />
  <title>BitFlow · Gestión de planillas de campo</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --c-primary: #0A2540;
      --c-primary-soft: #0F2D52;
      --c-primary-line: #1B3C68;
      --c-primary-hover: #14335D;
      --c-accent: #F97316;
      --c-accent-hover: #EA580C;
      --c-accent-soft: #FFF7ED;
      --c-bg: #F6F7F9;
      --c-surface: #FFFFFF;
      --c-border: #E4E7EC;
      --c-border-strong: #CBD0D8;
      --c-text: #0F172A;
      --c-text-soft: #475569;
      --c-text-muted: #94A3B8;
      --c-ok: #059669;
      --c-ok-soft: #ECFDF5;
      --c-warn: #B45309;
      --c-warn-soft: #FEF3C7;
      --c-warn-border: #FDE4B0;
      --c-err: #B91C1C;
      --c-err-soft: #FEF2F2;
      --c-zebra: #FAFBFC;
      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 14px;
      --r-xl: 20px;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.06);
      --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.08);
      --shadow-xl: 0 20px 50px rgba(15, 23, 42, 0.20);
      --t-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
      --t-med: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --t-slow: 320ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--c-text);
      background: var(--c-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    button, input { font-family: inherit; }

    /* ── Header ──────────────────────────────────────────────────────── */
    .app-header {
      background: var(--c-primary);
      color: #fff;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      border-bottom: 1px solid var(--c-primary-line);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: opacity var(--t-med);
    }
    .brand:hover { opacity: 0.85; }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--c-accent), var(--c-accent-hover));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 15px;
      color: #fff;
    }

    .brand-sep {
      width: 1px;
      height: 22px;
      background: var(--c-primary-line);
      margin: 0 16px;
    }

    .brand-project {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .header-spacer { flex: 1; }

    .sync-icon {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.9);
      cursor: pointer;
      transition: all var(--t-med);
      margin-right: 12px;
    }
    .sync-icon:hover { background: rgba(255,255,255,0.14); }
    .sync-icon.pending { background: rgba(245, 158, 11, 0.18); border-color: rgba(245, 158, 11, 0.35); color: #FCD34D; }
    .sync-icon.error   { background: rgba(239, 68, 68, 0.18); border-color: rgba(239, 68, 68, 0.35); color: #FCA5A5; }

    .sync-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ADE80;
      box-shadow: 0 0 6px rgba(74, 222, 128, 0.55);
    }
    .sync-icon.pending .sync-dot { background: #FBBF24; box-shadow: 0 0 6px rgba(251, 191, 36, 0.55); }
    .sync-icon.error   .sync-dot { background: #EF4444; box-shadow: 0 0 6px rgba(239, 68, 68, 0.55); }
    .sync-icon.syncing {
      background: rgba(249, 115, 22, 0.18);
      border-color: rgba(249, 115, 22, 0.35);
      color: #FDBA74;
    }
    .sync-icon.syncing .sync-dot { animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.6; }
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 10px 4px 4px;
      border-radius: 999px;
      cursor: pointer;
      transition: background var(--t-med);
    }
    .header-user:hover { background: rgba(255,255,255,0.08); }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--c-accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.2px;
    }
    .user-meta { line-height: 1.2; }
    .user-name { font-size: 13px; font-weight: 600; color: #fff; }
    .user-role { font-size: 11px; color: rgba(255,255,255,0.6); }

    /* ── Offline banner ──────────────────────────────────────────────── */
    .offline-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 16px;
      background: linear-gradient(180deg, #FEF3C7 0%, #FDE68A 100%);
      border-bottom: 1px solid var(--c-warn-border);
      color: #78350F;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--t-med);
      animation: slideDown 300ms cubic-bezier(0.4, 0, 0.2, 1);
      position: sticky;
      top: 60px;
      z-index: 40;
    }
    .offline-banner:hover { background: linear-gradient(180deg, #FDE68A 0%, #FCD34D 100%); }
    .offline-banner strong { font-weight: 700; }
    .offline-banner .chevron { opacity: 0.6; transition: transform var(--t-med); }
    .offline-banner:hover .chevron { transform: translateX(3px); }

    @keyframes slideDown {
      from { transform: translateY(-100%); }
      to { transform: translateY(0); }
    }

    /* ── Main ─────────────────────────────────────────────────────────── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 22px 40px;
    }

    /* ── Dashboard ───────────────────────────────────────────────────── */
    .dash-greeting {
      margin-bottom: 24px;
    }
    .dash-greeting h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.6px;
      margin: 0 0 4px;
      color: var(--c-text);
    }
    .dash-greeting h1 .muted { color: var(--c-text-soft); font-weight: 500; }
    .dash-greeting p { margin: 0; color: var(--c-text-soft); font-size: 14px; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .kpi {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      transition: all var(--t-med);
    }
    .kpi:hover {
      border-color: var(--c-border-strong);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .kpi.accent  { border-left: 3px solid var(--c-accent); }
    .kpi.warn    { border-left: 3px solid var(--c-warn);   }
    .kpi.ok      { border-left: 3px solid var(--c-ok);     }

    .kpi-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.6px;
      line-height: 1.05;
    }
    .kpi-sub {
      font-size: 12px;
      color: var(--c-text-soft);
      margin-top: 6px;
    }
    .kpi-trend {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: 4px;
    }
    .kpi-trend.up   { background: var(--c-ok-soft);   color: var(--c-ok);   }
    .kpi-trend.warn { background: var(--c-warn-soft); color: var(--c-warn); }

    /* ── Primary CTA ─────────────────────────────────────────────────── */
    .cta-new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 22px;
      background: var(--c-accent);
      color: #fff;
      border: none;
      border-radius: var(--r-lg);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(249, 115, 22, 0.28);
      transition: all var(--t-med);
      margin-bottom: 28px;
      letter-spacing: -0.1px;
    }
    .cta-new:hover {
      background: var(--c-accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(249, 115, 22, 0.38);
    }
    .cta-new:active { transform: translateY(0); }

    /* ── Sections ────────────────────────────────────────────────────── */
    .section {
      margin-bottom: 32px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--c-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .section-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--c-text-soft);
      cursor: pointer;
      transition: color var(--t-med);
    }
    .section-link:hover { color: var(--c-accent); }

    /* ── Templates ───────────────────────────────────────────────────── */
    .template-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .template {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: all var(--t-med);
      text-align: left;
    }
    .template:hover {
      border-color: var(--c-accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .template:hover .tpl-arrow { opacity: 1; transform: translateX(0); }

    .tpl-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
    }
    .tpl-body { flex: 1; min-width: 0; }
    .tpl-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.1px;
      color: var(--c-text);
      margin: 0 0 2px;
    }
    .tpl-desc {
      font-size: 12.5px;
      color: var(--c-text-soft);
      margin: 0;
      line-height: 1.4;
    }
    .tpl-meta {
      font-size: 11px;
      color: var(--c-text-muted);
      margin-top: 6px;
      font-weight: 500;
    }
    .tpl-arrow {
      color: var(--c-accent);
      opacity: 0;
      transform: translateX(-6px);
      transition: all var(--t-med);
      flex-shrink: 0;
    }

    /* ── Recents ─────────────────────────────────────────────────────── */
    .recent-list {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }

    .recent {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--c-border);
      cursor: pointer;
      transition: background var(--t-fast);
    }
    .recent:last-child { border-bottom: none; }
    .recent:hover { background: var(--c-zebra); }

    .recent-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--c-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-primary);
      flex-shrink: 0;
    }

    .recent-body { flex: 1; min-width: 0; }
    .recent-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--c-text);
      letter-spacing: -0.1px;
      margin: 0 0 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .recent-meta {
      font-size: 12px;
      color: var(--c-text-soft);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .recent-meta .sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--c-text-muted);
    }

    /* ── Status pill ─────────────────────────────────────────────────── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
    }
    .status-icon {
      width: 13px;
      height: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-ok      { background: var(--c-ok-soft);   color: var(--c-ok);   }
    .status-warn    { background: var(--c-warn-soft); color: var(--c-warn); }
    .status-err     { background: var(--c-err-soft);  color: var(--c-err);  }
    .status-pending { background: #EFF6FF; color: #1D4ED8; }
    .status-closed  { background: #EDE9FE; color: #6D28D9; }
    .status-idle    { background: #F1F5F9; color: #64748B; }

    /* ── Page head (planilla) ────────────────────────────────────────── */
    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: var(--c-text-soft);
      cursor: pointer;
      margin-bottom: 8px;
      padding: 2px 0;
      transition: color var(--t-med);
    }
    .back-link:hover { color: var(--c-accent); }

    .page-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .page-sub { font-size: 13px; color: var(--c-text-soft); }

    .actions-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 14px;
      border-radius: var(--r-md);
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--t-med);
      line-height: 1;
    }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none !important; }

    .btn-primary {
      background: var(--c-accent);
      color: #fff;
      border-color: var(--c-accent);
      box-shadow: 0 1px 2px rgba(249, 115, 22, 0.2);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--c-accent-hover);
      border-color: var(--c-accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(249, 115, 22, 0.25);
    }

    .btn-secondary {
      background: var(--c-primary);
      color: #fff;
      border-color: var(--c-primary);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--c-primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-ghost {
      background: var(--c-surface);
      color: var(--c-text);
      border-color: var(--c-border);
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: var(--c-border-strong);
      background: var(--c-bg);
    }

    .btn-icon {
      width: 34px;
      height: 34px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--r-md);
      background: transparent;
      border: 1px solid transparent;
      color: var(--c-text-soft);
      cursor: pointer;
      transition: all var(--t-med);
    }
    .btn-icon:hover {
      background: var(--c-bg);
      color: var(--c-text);
      border-color: var(--c-border);
    }
    .btn .icon { width: 15px; height: 15px; }

    /* ── Card ─────────────────────────────────────────────────────────── */
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    /* ── Planilla toolbar ────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--c-border);
    }

    .search {
      position: relative;
      flex: 1;
      max-width: 340px;
    }
    .search input {
      width: 100%;
      height: 34px;
      padding: 0 12px 0 34px;
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      font-size: 13px;
      color: var(--c-text);
      background: var(--c-bg);
      outline: none;
      transition: all var(--t-med);
    }
    .search input:focus {
      background: var(--c-surface);
      border-color: var(--c-accent);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--c-text-muted);
      pointer-events: none;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 500;
      color: var(--c-text-soft);
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: 999px;
      cursor: pointer;
      transition: all var(--t-med);
    }
    .filter-chip:hover {
      border-color: var(--c-border-strong);
      color: var(--c-text);
    }
    .filter-chip.active {
      background: var(--c-primary);
      color: #fff;
      border-color: var(--c-primary);
    }

    .toolbar-spacer { flex: 1; }

    /* ── Warning banner (inline) ─────────────────────────────────────── */
    .warn-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--c-warn-soft);
      border-bottom: 1px solid var(--c-warn-border);
      color: #78350F;
      font-size: 13px;
    }
    .warn-banner strong { font-weight: 700; }
    .warn-banner .spacer { flex: 1; }
    .warn-link {
      font-weight: 600;
      color: #78350F;
      text-decoration: underline;
      cursor: pointer;
      transition: opacity var(--t-med);
    }
    .warn-link:hover { opacity: 0.7; }

    /* ── Table ───────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead { background: #FAFBFC; }

    th {
      text-align: left;
      padding: 11px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-soft);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--c-border);
      white-space: nowrap;
    }
    th.center { text-align: center; }
    th.right { text-align: right; }

    tbody tr {
      border-bottom: 1px solid var(--c-border);
      transition: background var(--t-fast);
    }
    tbody tr:nth-child(even) { background: var(--c-zebra); }
    tbody tr:hover { background: #F1F5FB; }
    tbody tr:last-child { border-bottom: none; }

    td {
      padding: 11px 14px;
      color: var(--c-text);
      vertical-align: middle;
    }
    td.id {
      font-weight: 600;
      color: var(--c-primary);
      font-variant-numeric: tabular-nums;
    }
    td.num {
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    td.muted { color: var(--c-text-soft); }

    /* ── Attachment thumbnails ───────────────────────────────────────── */
    .attach-cell {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .thumb {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--c-border);
      position: relative;
      flex-shrink: 0;
      background-size: cover;
      background-position: center;
      cursor: pointer;
      transition: transform var(--t-fast);
    }
    .thumb:hover { transform: scale(1.15); z-index: 2; box-shadow: var(--shadow-md); }
    .thumb.audio {
      background: linear-gradient(135deg, #1E40AF, #3B82F6);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb.video {
      background: linear-gradient(135deg, #7C3AED, #A78BFA);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
    }
    .thumb-count {
      display: inline-flex;
      align-items: center;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 600;
      color: var(--c-text-soft);
      background: var(--c-bg);
      border-radius: 5px;
      margin-left: 2px;
    }

    /* GPS action chip */
    .gps-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      font-size: 11.5px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all var(--t-med);
      white-space: nowrap;
    }
    .gps-chip.has {
      background: var(--c-ok-soft);
      color: var(--c-ok);
    }
    .gps-chip.capture {
      background: var(--c-accent-soft);
      color: var(--c-accent-hover);
      border: 1px dashed #FDBA74;
    }
    .gps-chip.capture:hover {
      background: var(--c-accent);
      color: #fff;
      border-color: var(--c-accent);
      border-style: solid;
    }

    /* ── Row actions ─────────────────────────────────────────────────── */
    .row-actions {
      display: flex;
      gap: 2px;
      justify-content: flex-end;
      opacity: 0;
      transition: opacity var(--t-med);
    }
    tbody tr:hover .row-actions { opacity: 1; }

    .action-btn {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--c-text-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--t-fast);
    }
    .action-btn:hover {
      background: var(--c-surface);
      color: var(--c-primary);
      box-shadow: var(--shadow-sm);
    }

    /* ── Tooltip ─────────────────────────────────────────────────────── */
    [data-tip] { position: relative; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      background: var(--c-primary);
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 9px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: all var(--t-med);
      z-index: 100;
      letter-spacing: 0.1px;
    }
    [data-tip]:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Status bar footer ───────────────────────────────────────────── */
    .statusbar {
      padding: 10px 16px;
      border-top: 1px solid var(--c-border);
      background: #FAFBFC;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 12px;
      color: var(--c-text-soft);
      flex-wrap: wrap;
    }
    .statusbar .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--c-border-strong);
    }

    /* ── Modal ───────────────────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10, 37, 64, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: backdropIn 200ms ease;
    }
    @keyframes backdropIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      background: var(--c-surface);
      border-radius: var(--r-xl);
      max-width: 640px;
      width: 100%;
      max-height: calc(100vh - 40px);
      overflow: hidden;
      box-shadow: var(--shadow-xl);
      display: flex;
      flex-direction: column;
      animation: modalIn 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal.wide { max-width: 820px; }

    .modal-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--c-border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .modal-head h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      flex: 1;
    }
    .modal-head .close {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--c-text-soft);
      cursor: pointer;
      transition: all var(--t-fast);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-head .close:hover { background: var(--c-bg); color: var(--c-text); }

    .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
    .modal-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--c-border);
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      background: var(--c-zebra);
    }

    /* ── Sync queue list ─────────────────────────────────────────────── */
    .queue-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--c-warn-soft);
      border: 1px solid var(--c-warn-border);
      border-radius: var(--r-md);
      margin-bottom: 14px;
      color: #78350F;
      font-size: 13px;
      font-weight: 500;
    }

    .queue-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      background: var(--c-surface);
      transition: all var(--t-fast);
    }
    .queue-item:hover { border-color: var(--c-border-strong); background: var(--c-zebra); }
    .queue-item.syncing { border-color: var(--c-accent); background: var(--c-accent-soft); }
    .queue-item.done { opacity: 0.55; }

    .queue-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--c-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-primary);
      flex-shrink: 0;
    }
    .queue-body { flex: 1; min-width: 0; }
    .queue-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--c-text);
      letter-spacing: -0.05px;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .queue-title .tag {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--c-bg);
      color: var(--c-text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .queue-sub {
      font-size: 11.5px;
      color: var(--c-text-soft);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .queue-meta {
      font-size: 11px;
      color: var(--c-text-muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      text-align: right;
    }

    /* ── Signature canvas ─────────────────────────────────────────────── */
    .sign-group { margin-bottom: 16px; }
    .sign-group:last-child { margin-bottom: 0; }
    .sign-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--c-text-soft);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sign-label .optional {
      font-size: 10.5px;
      color: var(--c-text-muted);
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }

    .sign-canvas-wrap {
      position: relative;
      background: #FAFBFC;
      border: 2px dashed var(--c-border-strong);
      border-radius: var(--r-md);
      height: 130px;
      overflow: hidden;
      transition: border-color var(--t-med);
    }
    .sign-canvas-wrap.signed { border-style: solid; border-color: var(--c-ok); background: #fff; }
    .sign-canvas-wrap canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }
    .sign-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-text-muted);
      font-size: 13px;
      font-weight: 500;
      pointer-events: none;
    }
    .sign-clear {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--c-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--c-text-soft);
      transition: all var(--t-fast);
      opacity: 0.85;
    }
    .sign-clear:hover { opacity: 1; background: #fff; color: var(--c-err); border-color: var(--c-err); }
    .sign-meta {
      margin-top: 6px;
      font-size: 11.5px;
      color: var(--c-text-soft);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .input {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      font-size: 13px;
      color: var(--c-text);
      background: var(--c-surface);
      outline: none;
      transition: all var(--t-med);
    }
    .input:focus {
      border-color: var(--c-accent);
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
    }

    .check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: var(--c-bg);
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: all var(--t-med);
      font-size: 13px;
    }
    .check:hover { border-color: var(--c-border-strong); }
    .check.active { background: var(--c-accent-soft); border-color: var(--c-accent); }

    .check-box {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 1.5px solid var(--c-border-strong);
      background: var(--c-surface);
      flex-shrink: 0;
      margin-top: 1px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: all var(--t-fast);
    }
    .check.active .check-box {
      background: var(--c-accent);
      border-color: var(--c-accent);
    }
    .check-body { flex: 1; }
    .check-title { font-weight: 600; color: var(--c-text); }
    .check-sub { font-size: 12px; color: var(--c-text-soft); margin-top: 2px; }

    /* ── PDF Preview (closed planilla) ───────────────────────────────── */
    .pdf-sheet {
      background: #fff;
      border-radius: var(--r-md);
      border: 1px solid var(--c-border);
      padding: 24px;
      font-family: Georgia, 'Times New Roman', serif;
      color: #0F172A;
      box-shadow: var(--shadow-sm);
    }
    .pdf-sheet-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--c-primary);
      margin-bottom: 18px;
    }
    .pdf-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: -apple-system, sans-serif;
    }
    .pdf-logo .mark {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--c-accent), var(--c-accent-hover));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 17px;
    }
    .pdf-logo-text .name { font-weight: 700; font-size: 15px; }
    .pdf-logo-text .tag  { font-size: 11px; color: var(--c-text-soft); }

    .pdf-docid {
      text-align: right;
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      color: var(--c-text-soft);
    }
    .pdf-docid .id {
      font-weight: 700;
      color: var(--c-primary);
      font-size: 13px;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .pdf-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px;
      letter-spacing: -0.2px;
      color: var(--c-primary);
    }
    .pdf-subtitle {
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      color: var(--c-text-soft);
      margin-bottom: 16px;
    }

    .pdf-kvs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px 24px;
      font-family: -apple-system, sans-serif;
      font-size: 12.5px;
      background: var(--c-bg);
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .pdf-kvs .k { color: var(--c-text-soft); font-weight: 500; }
    .pdf-kvs .v { font-weight: 600; color: var(--c-text); }

    .pdf-sign-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }
    .pdf-sign {
      border: 1px solid var(--c-border);
      border-radius: 8px;
      padding: 12px;
      background: #fff;
    }
    .pdf-sign-img {
      height: 70px;
      background: #FAFBFC;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      border: 1px solid var(--c-border);
      overflow: hidden;
    }
    .pdf-sign-img img { max-height: 100%; max-width: 100%; }
    .pdf-sign-name {
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--c-text);
    }
    .pdf-sign-role {
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      color: var(--c-text-soft);
    }

    .pdf-foot {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding-top: 14px;
      border-top: 1px solid var(--c-border);
      font-family: -apple-system, sans-serif;
    }
    .pdf-foot-info { flex: 1; font-size: 10.5px; color: var(--c-text-soft); line-height: 1.55; }
    .pdf-foot-info .hash {
      font-family: 'SF Mono', ui-monospace, Menlo, monospace;
      background: var(--c-bg);
      padding: 2px 5px;
      border-radius: 3px;
      color: var(--c-text);
      word-break: break-all;
      font-size: 10px;
    }

    .qr {
      width: 78px;
      height: 78px;
      background: #fff;
      border: 1px solid var(--c-border);
      border-radius: 6px;
      padding: 4px;
      flex-shrink: 0;
      display: block;
      object-fit: contain;
    }

    /* ── Toast ───────────────────────────────────────────────────────── */
    .toast-holder {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--c-primary);
      color: #fff;
      padding: 12px 18px;
      border-radius: var(--r-md);
      font-size: 13.5px;
      font-weight: 500;
      box-shadow: var(--shadow-xl);
      pointer-events: auto;
      animation: toastIn 220ms cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 280px;
      max-width: 440px;
    }
    .toast.success { background: var(--c-ok); }
    .toast.warn    { background: var(--c-warn); }
    .toast.error   { background: var(--c-err); }
    .toast.fading { animation: toastOut 200ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(12px); }
    }

    /* ── Planilla closed (read-only) ─────────────────────────────────── */
    .closed-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #EDE9FE;
      color: #6D28D9;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.1px;
    }

    /* ── Dev toggle (demo control only) ──────────────────────────────── */
    .dev-toggle {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 200;
      display: flex;
      gap: 6px;
      background: var(--c-primary);
      color: #fff;
      padding: 6px;
      border-radius: 999px;
      box-shadow: var(--shadow-lg);
      font-size: 11px;
      font-weight: 600;
    }
    .dev-toggle button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      padding: 6px 10px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all var(--t-fast);
    }
    .dev-toggle button.active {
      background: var(--c-accent);
      color: #fff;
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: 1fr 1fr 1fr; }
      .page-head { flex-direction: column; align-items: stretch; }
      .col-hide-md { display: none; }
    }

    @media (max-width: 720px) {
      .app-header { padding: 0 12px; height: 56px; }
      .brand-sep, .brand-project { display: none; }
      .user-meta { display: none; }
      .sync-icon { padding: 4px 10px; margin-right: 6px; }
      .sync-icon .sync-text { display: none; }

      main { padding: 18px 12px 120px; }

      .dash-greeting h1 { font-size: 21px; }
      .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .kpi { padding: 14px; }
      .kpi-value { font-size: 22px; }
      .kpi-grid .kpi:nth-child(3) { grid-column: span 2; }

      .cta-new { padding: 14px 18px; font-size: 14.5px; min-height: 52px; }

      .template-grid { grid-template-columns: 1fr; }

      .actions-row { width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); }
      .actions-row .btn {
        justify-content: center;
        min-height: 44px;
        font-size: 13.5px;
        padding: 10px 8px;
      }
      .actions-row .btn-label { display: none; }

      .toolbar { flex-wrap: wrap; }
      .search { max-width: none; width: 100%; }
      .col-hide-sm { display: none; }
      th, td { padding: 10px 10px; font-size: 12.5px; }
      .row-actions { opacity: 1; }

      .modal { border-radius: var(--r-lg); max-height: calc(100vh - 20px); }
      .modal-head { padding: 14px 16px; }
      .modal-body { padding: 16px; }
      .modal-foot { padding: 12px 16px; flex-direction: column-reverse; }
      .modal-foot .btn { width: 100%; justify-content: center; min-height: 44px; }

      .pdf-sign-grid { grid-template-columns: 1fr; }
      .pdf-kvs { grid-template-columns: 1fr; }

      .dev-toggle { bottom: 12px; right: 12px; }
    }

    /* ── Utility ─────────────────────────────────────────────────────── */
    .fade-in { animation: fadeIn 250ms cubic-bezier(0.4, 0, 0.2, 1) both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  </style>
</head>

  <div id="root"></div>

    const { useState, useMemo, useRef, useEffect, useCallback } = React;

      const palettes = [

        ['#059669','#34D399'], ['#B45309','#F59E0B'], ['#DC2626','#F87171'],
        ['#1E40AF','#3B82F6'], ['#0F766E','#2DD4BF'], ['#92400E','#F97316'],
        ['#4338CA','#818CF8'],
      ];
      let h = 0;
      for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) & 0xffffffff;
      const p = palettes[Math.abs(h) % palettes.length];
      return `linear-gradient(135deg, ${p[0]}, ${p[1]})`;
    };

    const sha256 = async (text) => {
      if (!window.crypto?.subtle) {
        // Fallback: deterministic hash-ish hex (64 chars)
        let h = 0;
        for (let i = 0; i < text.length; i++) h = ((h << 5) - h + text.charCodeAt(i)) | 0;
        return Array.from({length: 64}, (_, i) => (((h + i*13) & 0xf)).toString(16)).join('');
      }
      const enc = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    };

    // Signature canvas
    // ══════════════════════════════════════════════════════════
    const SignatureCanvas = React.forwardRef(({ onSigned }, ref) => {
      const canvasRef = useRef(null);
      const drawingRef = useRef(false);
      const [hasInk, setHasInk] = useState(false);
      const [strokeCount, setStrokeCount] = useState(0);
      const [signedAt, setSignedAt] = useState(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width  = rect.width  * dpr;
        canvas.height = rect.height * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        ctx.strokeStyle = '#0A2540';
        ctx.lineWidth = 1.8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
      }, []);

      const getPoint = (e) => {
        const rect = canvasRef.current.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
        };
      };

      const startDraw = (e) => {
        e.preventDefault();
        canvasRef.current.setPointerCapture(e.pointerId);
        drawingRef.current = true;
        const p = getPoint(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      };
      const moveDraw = (e) => {
        if (!drawingRef.current) return;
        const p = getPoint(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      };
      const endDraw = (e) => {
        if (!drawingRef.current) return;
        drawingRef.current = false;
        setHasInk(true);
        setStrokeCount(s => s + 1);
        const now = new Date();
        setSignedAt(now);
        onSigned?.(canvasRef.current.toDataURL('image/png'));
      };

      const clear = () => {
        const c = canvasRef.current;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        setHasInk(false);
        setStrokeCount(0);
        setSignedAt(null);
        onSigned?.(null);
      };

      React.useImperativeHandle(ref, () => ({
        clear,
        getDataURL: () => hasInk ? canvasRef.current.toDataURL('image/png') : null,
        isSigned: () => hasInk,
      }));

      const timeStr = signedAt ? signedAt.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : null;

      return (
        <div>
          <div className={`sign-canvas-wrap ${hasInk ? 'signed' : ''}`}>
            <canvas
              ref={canvasRef}
              onPointerDown={startDraw}
              onPointerMove={moveDraw}
              onPointerUp={endDraw}
              onPointerCancel={endDraw}
            />
            {!hasInk && (
              <div className="sign-placeholder">
                <Icon name="pen" size={14} stroke={2} /> &nbsp;Firmar con el dedo o mouse
              </div>
            )}
            {hasInk && (
              <button className="sign-clear" onClick={clear} data-tip="Limpiar firma">
                <Icon name="x" size={13} stroke={2.2} />
              </button>
            )}
          </div>
          {hasInk && (
            <div className="sign-meta">
              <span><Icon name="check" size={11} stroke={2.5} /> Firma capturada</span>
              {timeStr && <span>· {timeStr}</span>}
              <span>· {strokeCount} trazos</span>
            </div>
          )}
        </div>
      );
    });

    // Signature Modal
    // ══════════════════════════════════════════════════════════
    const SignatureModal = ({ planilla, onClose, onConfirm }) => {
      const opRef  = useRef(null);
      const supRef = useRef(null);
      const [opSigned, setOpSigned]   = useState(false);
      const [supSigned, setSupSigned] = useState(false);
      const [certified, setCertified] = useState(false);
      const [supEmail, setSupEmail]   = useState('');
      const [submitting, setSubmitting] = useState(false);

      const canConfirm = opSigned && certified && !submitting;

      const confirm = async () => {
        if (!canConfirm) return;
        setSubmitting(true);
        const opImg  = opRef.current?.getDataURL();
        const supImg = supRef.current?.getDataURL();
        // Build hashable payload
        const payload = JSON.stringify({
          planilla: planilla.id,
          title: planilla.title,
          rows: planilla.rows,
          operator: { name: USER.name, signed: true },
          supervisor: { email: supEmail || null, signed: !!supImg },
          timestamp: new Date().toISOString(),
        });
        const hash = await sha256(payload);
        onConfirm({ opImg, supImg, supEmail, hash, timestamp: new Date() });
      };

      return (
        <Modal
          title="Cerrar y firmar planilla"
          icon="lock"
          wide
          onClose={onClose}
          footer={
            <>
              <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" disabled={!canConfirm} onClick={confirm}>
                {submitting ? <><Icon name="refresh" size={14} className="spin" /> Cerrando…</>
                            : <><Icon name="verified" /> Cerrar y generar PDF</>}
              </button>
            </>
          }
        >
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12.5, color: 'var(--c-text-soft)', marginBottom: 4, textTransform: 'uppercase', letterSpacing: 0.5, fontWeight: 600 }}>

          <div className="sign-group">
            <div className="sign-label">
              <span>Firma del operador</span>
              <span>{USER.name}</span>

            <SignatureCanvas ref={opRef} onSigned={(d) => setOpSigned(!!d)} />

    // ══════════════════════════════════════════════════════════
    // Root App
    // ══════════════════════════════════════════════════════════
    const App = () => {
      const [view, setView]         = useState('dashboard'); // 'dashboard' | 'planilla'
      const [online, setOnline]     = useState(true);
      const [syncState, setSyncState] = useState('ok'); // 'ok' | 'pending' | 'syncing' | 'error'
      const [modal, setModal]       = useState(null);   // 'queue' | 'sign' | 'pdf' | null
      const [queue, setQueue]       = useState([]);     // INITIAL_QUEUE when offline
      const [rows]                  = useState(initialRows);
      const [planilla, setPlanilla] = useState({
        id: 'P-0421',
        title: 'Loma Campana · Turno día',
        template: 'Resistividad de suelos',
        rows: initialRows.length,
      });
      const [locked, setLocked]   = useState(false);
      const [signature, setSignature] = useState(null);
      const { toasts, push, remove } = useToasts();

      // When offline → queue grows; when online → queue drains
      useEffect(() => {
        if (!online) {
          setQueue(INITIAL_QUEUE);
          setSyncState('pending');
        }
      }, [online]);

      const goOnline = async () => {
        if (queue.length === 0) {
          setOnline(true);
          setSyncState('ok');
          return;
        }
        setOnline(true);
        setSyncState('syncing');
        push('Reconectado · sincronizando…', { type: 'warn', icon: 'cloud' });
        // Fake sync progress
        for (let i = 0; i < queue.length; i++) {
          await new Promise(r => setTimeout(r, 320));
          setQueue(q => q.map((it, idx) => idx === i ? { ...it, state: 'syncing' } : it));
          await new Promise(r => setTimeout(r, 220));
          setQueue(q => q.map((it, idx) => idx === i ? { ...it, state: 'done' } : it));
        }
        await new Promise(r => setTimeout(r, 320));
        const n = queue.length;
        setQueue([]);
        setSyncState('ok');
        push(`${n} registros sincronizados`, { type: 'success', icon: 'check2' });
      };

      const handleOnlineToggle = (next) => {
        if (next === online) return;
        if (next === false) {
          setOnline(false);
          setSyncState('pending');
          push('Sin conexión · trabajando offline', { type: 'warn', icon: 'wifiOff', duration: 2000 });
        } else {
          goOnline();
        }
      };

      const handleManualSync = async () => {
        if (!online) return;
        if (queue.length === 0) {
          push('Todo al día', { type: 'success', icon: 'check2', duration: 1500 });
          return;
        }
        setSyncState('syncing');
        for (let i = 0; i < queue.length; i++) {
          await new Promise(r => setTimeout(r, 280));
          setQueue(q => q.map((it, idx) => idx === i ? { ...it, state: 'done' } : it));
        }
        await new Promise(r => setTimeout(r, 260));
        const n = queue.length;
        setQueue([]);
        setSyncState('ok');
        push(`${n} registros sincronizados`, { type: 'success', icon: 'check2' });
        setModal(null);
      };

      const handleExport = () => {
        if (locked) {
          setModal('pdf');
          return;
        }
        setModal('sign');
      };

      const handleSignConfirm = (sig) => {
        setSignature(sig);
        setLocked(true);
        setModal('pdf');
        push('Planilla cerrada y firmada', { type: 'success', icon: 'verified' });
      };

      const handleTemplate = (t) => {
        setPlanilla({
          id: `P-${Math.floor(Math.random() * 9000 + 1000)}`,
          title: `${t.title} · nueva`,
          template: t.title,
          rows: 0,
        });
        setLocked(false);
        setSignature(null);
        setView('planilla');
      };

      const openRecent = (r) => {
        setPlanilla({ id: r.id, title: r.title, template: r.template, rows: r.rows });
        setLocked(r.status === 'closed');
        setSignature(null);
        setView('planilla');
      };

      const projectLabel = `${planilla.template} · ${USER.company.split(' · ').slice(-1)[0]}`;

      return (
        <>
          <Header
            view={view}
            projectLabel={projectLabel}
            online={online}
            syncStatus={syncState}
            pendingCount={queue.length}
            onBrandClick={() => setView('dashboard')}
            onSyncClick={() => setModal('queue')}
          />
          {!online && <OfflineBanner count={queue.length} onTap={() => setModal('queue')} />}
          <main>
            {view === 'dashboard'
              ? <Dashboard
                  activeCount={8}
                  pendingCount={queue.length}
                  completedCount={47}
                  onNew={() => handleTemplate(TEMPLATES[4])}
                  onTemplate={handleTemplate}
                  onOpen={openRecent}
                />
              : <Planilla
                  planilla={planilla}
                  rows={rows}
                  locked={locked}
                  online={online}
                  onBack={() => setView('dashboard')}
                  onExport={handleExport}
                  onOpenSync={() => setModal('queue')}
                  onCapture={() => {}}
                  pushToast={push}
                />
            }
          </main>

          {modal === 'queue' && (
            <SyncQueueModal
              queue={queue}
              online={online}
              syncing={syncState === 'syncing'}
              onClose={() => setModal(null)}
              onSync={handleManualSync}
            />
          )}
          {modal === 'sign' && (
            <SignatureModal
              planilla={planilla}
              onClose={() => setModal(null)}
              onConfirm={handleSignConfirm}
            />
          )}
          {modal === 'pdf' && signature && (
            <PdfPreviewModal
              planilla={planilla}
              signature={signature}
              onClose={() => setModal(null)}
            />
          )}

          <ToastHolder toasts={toasts} onDone={remove} />

          {SHOW_DEMO_CONTROLS && (
            <div className="dev-toggle">
              <span style={{ padding: '0 8px', fontSize: 10, opacity: 0.65 }}>DEMO</span>
              <button className={online ? 'active' : ''} onClick={() => handleOnlineToggle(true)}>Online</button>
              <button className={!online ? 'active' : ''} onClick={() => handleOnlineToggle(false)}>Offline</button>
            </div>
          )}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
