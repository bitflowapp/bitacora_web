<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF" />

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

  <!-- iOS: viewport correcto -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Bit Flow — Planillas para ingenieros en campo</title>
  <meta name="description" content="Planillas dinámicas con GPS, fotos, audio y export Excel/PDF. Offline-first." />
  <meta name="robots" content="index,follow" />

  <!-- BUILD ID fallback (si version.json no está disponible) -->
  <meta name="bitflow-build" content="__BUILD_ID__" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bit Flow" />
  <meta name="application-name" content="Bit Flow" />
  <meta name="theme-color" content="#007AFF" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root { --app-h: 100vh; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;            /* clave: Safari no scrollea el documento */
      overscroll-behavior: none;
      background: #FFFFFF;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
      height: var(--app-h);
      background: #FFFFFF;
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* iOS Safari: evita zoom al enfocar input “invisible” de Flutter */
    input, textarea, select { font-size: 16px !important; }

    #build-badge {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 2147483647;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 12px;
      line-height: 1;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      pointer-events: none;
    }

    #boot-fallback {
      position: fixed;
      inset: 0;
      z-index: 2147483646;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.94);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #111;
    }

    #boot-fallback .card {
      width: min(560px, 100%);
      border: 1px solid rgba(0, 0, 0, 0.14);
      border-radius: 18px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
    }

    #boot-fallback h2 {
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    #boot-fallback p {
      margin: 0 0 12px;
      line-height: 1.35;
      color: #444;
    }

    #boot-fallback .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    #boot-fallback button,
    #boot-fallback a {
      border: 1px solid rgba(0, 0, 0, 0.18);
      border-radius: 999px;
      background: #fff;
      color: #111;
      padding: 8px 12px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    #boot-fallback .primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    #install-fab {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 2147483645;
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(17, 17, 17, 0.2);
      border-radius: 999px;
      background: #111;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      animation: installPulse 2s ease-in-out infinite;
    }

    @keyframes installPulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>

  <script>
    (function () {
      var bootGuardTimer = 0;
      var bootReady = false;
      var installPromptEvent = null;
      var startInvoked = false;

      function showBootFallback(reason) {
        try {
          if (bootReady) return;
          var root = document.getElementById('boot-fallback');
          if (!root) return;
          if (root.style.display === 'flex') return;
          root.style.display = 'flex';
          var msg = root.querySelector('[data-role=\"message\"]');
          if (msg && reason) msg.textContent = reason;
        } catch (_) {}
      }

      function hideBootFallback() {
        try {
          var root = document.getElementById('boot-fallback');
          if (!root) return;
          root.style.display = 'none';
        } catch (_) {}
      }

      function markBootReady() {
        if (bootReady) return;
        bootReady = true;
        if (bootGuardTimer) {
          clearTimeout(bootGuardTimer);
          bootGuardTimer = 0;
        }
        hideBootFallback();
      }

      function showInstallFab() {
        var btn = document.getElementById('install-fab');
        if (!btn) return;
        btn.style.display = 'inline-flex';
      }

      function hideInstallFab() {
        var btn = document.getElementById('install-fab');
        if (!btn) return;
        btn.style.display = 'none';
      }

      async function promptInstall() {
        if (!installPromptEvent) return;
        try {
          installPromptEvent.prompt();
          await installPromptEvent.userChoice;
        } catch (_) {
          // noop
        } finally {
          installPromptEvent = null;
          hideInstallFab();
        }
      }

      async function resolveBuildId() {
        try {
          var res = await fetch('version.json?x=' + Date.now(), {
            cache: 'no-store'
          });
          if (res.ok) {
            var json = await res.json();
            if (json && typeof json === 'object') {
              var fromVersion = (json.buildId || json.gitSha || json.buildTime || '')
                .toString()
                .trim();
              if (fromVersion) return fromVersion;
            }
          }
        } catch (_) {}

        var m = document.querySelector('meta[name="bitflow-build"]');
        var v = m ? (m.getAttribute('content') || '') : '';
        if (v && v !== '__BUILD_ID__') return v;
        return 'dev-' + Date.now();
      }

      async function resolveBuildIdFast(timeoutMs) {
        try {
          return await Promise.race([
            resolveBuildId(),
            new Promise(function (resolve) {
              setTimeout(function () {
                resolve('dev-' + Date.now());
              }, timeoutMs);
            }),
          ]);
        } catch (_) {
          return 'dev-' + Date.now();
        }
      }

      function mountBadge(build) {
        try {
          var el = document.getElementById('build-badge');
          if (!el) {
            el = document.createElement('div');
            el.id = 'build-badge';
            document.body.appendChild(el);
          }
          el.textContent = 'build ' + build;
        } catch (_) {}
      }

      // Offline-first SW update: on build change, tell the active SW to skip
      // waiting so the new version activates on the next navigation — without
      // killing the SW or evicting all caches (which breaks offline use).
      async function handleBuildChange(build) {
        var key = 'bitflow_last_build';
        var last = null;
        try { last = localStorage.getItem(key); } catch (_) {}

        if (last === build) return;
        try { localStorage.setItem(key, build); } catch (_) {}

        try {
          if ('serviceWorker' in navigator) {
            var reg = await navigator.serviceWorker.getRegistration();
            if (reg && reg.waiting) {
              // New SW is already installed and waiting — activate it cleanly.
              reg.waiting.postMessage({ type: 'SKIP_WAITING' });
            } else if (reg) {
              // Trigger an update check so the browser fetches a fresh SW.
              reg.update().catch(function () {});
            }
          }
        } catch (_) {}
      }

      function loadFlutterBootstrap(build) {
        try {
          var script = document.createElement('script');
          script.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(build);
          script.async = true;
          script.onload = function () {
            // El script cargo; el guard se desactiva al montar flt-glass-pane.
          };
          script.onerror = function () {
            showBootFallback('No se pudo cargar la app. Reintenta o abre la landing.');
          };
          document.body.appendChild(script);
        } catch (_) {}
      }

      function loadFlutterBootstrapDeferred(build) {
        var startLoad = function () {
          loadFlutterBootstrap(build);
        };
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(startLoad, { timeout: 1200 });
        } else {
          setTimeout(startLoad, 120);
        }
      }

      // iOS Safari keyboard fix: “pega” los roots de Flutter al visualViewport
      var raf = 0;
      var lastH = -1, lastTop = -1;
      var lastKick = 0;

      function applyViewport() {
        raf = 0;

        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        var top = vv ? vv.offsetTop : 0;

        if (!h) return;
        if (Math.abs(h - lastH) < 0.5 && Math.abs(top - lastTop) < 0.5) return;
        lastH = h; lastTop = top;

        document.documentElement.style.setProperty('--app-h', h + 'px');

        var nodes = document.querySelectorAll(
          'flt-glass-pane, flt-text-editing-host, flt-semantics-host, flt-announcement-host'
        );

        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          n.style.position = 'fixed';
          n.style.left = '0';
          n.style.right = '0';
          n.style.top = '0';
          n.style.width = '100%';
          n.style.height = h + 'px';
          n.style.transform = 'translateY(' + top + 'px)';
          n.style.transformOrigin = '0 0';
          n.style.willChange = 'transform,height';
        }

        // “patadita” a Flutter: fuerza recálculo cuando iOS se hace el distraído
        try {
          var now = Date.now();
          if (now - lastKick > 120) {
            lastKick = now;
            window.dispatchEvent(new Event('resize'));
          }
        } catch (_) {}
      }

      function scheduleApply() {
        if (raf) return;
        raf = requestAnimationFrame(applyViewport);
      }

      function boot() {
        scheduleApply();

        window.addEventListener('resize', scheduleApply, { passive: true });
        window.addEventListener('orientationchange', scheduleApply, { passive: true });
        document.addEventListener('focusin', scheduleApply, true);
        document.addEventListener('focusout', scheduleApply, true);

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', scheduleApply, { passive: true });
          window.visualViewport.addEventListener('scroll', scheduleApply, { passive: true });
        }

        try {
          new MutationObserver(function () {
            scheduleApply();
            if (document.querySelector('flt-glass-pane')) {
              markBootReady();
            }
          }).observe(document.documentElement, { childList: true, subtree: true });
        } catch (_) {}
      }

      async function start() {
        if (startInvoked) return;
        startInvoked = true;
        bootGuardTimer = setTimeout(function () {
          showBootFallback('Arranque demorado. Puedes reintentar sin perder estado local.');
        }, 12000);

        try {
          var build = await resolveBuildIdFast(1200);
          window.__BITFLOW_BUILD__ = build;
          mountBadge(build);
          boot();
          Promise.resolve().then(function () {
            return handleBuildChange(build);
          }).catch(function () {});
          loadFlutterBootstrapDeferred(build);
        } catch (_) {
          var fallback = 'dev-' + Date.now();
          window.__BITFLOW_BUILD__ = fallback;
          mountBadge(fallback);
          boot();
          loadFlutterBootstrapDeferred(fallback);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }

      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        installPromptEvent = event;
        showInstallFab();
      });

      window.addEventListener('appinstalled', function () {
        installPromptEvent = null;
        hideInstallFab();
      });

      window.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('install-fab');
        if (!btn) return;
        btn.addEventListener('click', function () {
          promptInstall();
        });
      });
    })();
  </script>
</head>

<body>
  <div id="boot-fallback" aria-live="polite">
    <div class="card">
      <h2>Bit Flow — Inicio seguro</h2>
      <p data-role="message">La app tarda mas de lo normal en iniciar.</p>
      <div class="row">
        <button class="primary" type="button" onclick="window.location.reload()">Reintentar app</button>
        <a href="bitflow/">Abrir landing premium</a>
      </div>
    </div>
  </div>
  <button id="install-fab" type="button" aria-label="Instalar Bit Flow">Instalar Bit Flow</button>
  <!-- flutter_bootstrap.js se inyecta dinámicamente con buildId -->
</body>
</html>
