<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF" />

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

  <!-- iOS: viewport correcto -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>BitFlow | Bitácora operativa premium</title>
  <meta name="description" content="BitFlow centraliza relevamientos, evidencias y exportaciones en una experiencia web premium lista para clientes." />
  <meta name="robots" content="index,follow" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="BitFlow | Bitácora operativa premium" />
  <meta property="og:description" content="BitFlow centraliza relevamientos, evidencias y exportaciones en una experiencia web premium lista para clientes." />
  <meta property="og:image" content="icons/Icon-512.png" />
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="BitFlow | Bitácora operativa premium" />
  <meta property="twitter:description" content="BitFlow centraliza relevamientos, evidencias y exportaciones en una experiencia web premium lista para clientes." />
  <meta property="twitter:image" content="icons/Icon-512.png" />

  <!-- BUILD ID fallback (si version.json no está disponible) -->
  <meta name="bitflow-build" content="__BUILD_ID__" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="BitFlow" />
  <meta name="application-name" content="BitFlow" />
  <meta name="theme-color" content="#C9AB84" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root {
      --app-h: 100vh;
      --bg: #f7f1e6;
      --surface: #fffaf2;
      --ink: #2c2721;
      --muted: #7d6f5f;
      --line: #dfd1bd;
      --accent: #c9ab84;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;            /* clave: Safari no scrollea el documento */
      overscroll-behavior: none;
      background: var(--bg);
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
      height: var(--app-h);
      background: radial-gradient(circle at top, #fff7ec 0%, var(--bg) 55%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* iOS Safari: evita zoom al enfocar input “invisible” de Flutter */
    input, textarea, select { font-size: 16px !important; }

    /* Build badge moved to Flutter widget (_BuildBadge). */

    #boot-splash {
      position: fixed;
      inset: 0;
      z-index: 2147483640;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, #fff7ec 0%, var(--bg) 58%);
      color: var(--ink);
      transition: opacity 220ms ease;
    }

    #boot-splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #boot-splash .shell {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 20px 44px rgba(103, 85, 64, 0.16);
      padding: 20px;
      text-align: center;
    }

    #boot-splash .logo {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      margin: 0 auto 14px;
      border: 1px solid rgba(201, 171, 132, 0.5);
      background: linear-gradient(160deg, #f4e4cb 0%, #ceb188 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 8px 20px rgba(102, 84, 59, 0.2);
      display: grid;
      place-items: center;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #3d3328;
      font-size: 22px;
    }

    #boot-splash h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    #boot-splash p {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.4;
      font-weight: 600;
    }

    #boot-fallback {
      position: fixed;
      inset: 0;
      z-index: 2147483646;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(247, 241, 230, 0.96);
      color: var(--ink);
    }

    #boot-fallback .card {
      width: min(560px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: var(--surface);
      box-shadow: 0 18px 40px rgba(93, 74, 48, 0.14);
    }

    #boot-fallback h2 {
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    #boot-fallback p {
      margin: 0 0 12px;
      line-height: 1.35;
      color: var(--muted);
    }

    #boot-fallback .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    #boot-fallback button,
    #boot-fallback a {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    #boot-fallback .primary {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    #update-banner {
      position: fixed;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 2147483647;
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(223, 209, 189, 0.88);
      background: rgba(44, 39, 33, 0.94);
      color: #fff;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
      font-size: 13px;
      line-height: 1.25;
    }

    #update-banner .actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #update-banner button {
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      background: transparent;
      color: #fff;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    #update-banner button.primary {
      border-color: #fff;
      background: #fff;
      color: #111;
    }

    #install-fab {
      position: fixed;
      left: 10px;
      bottom: 10px;
      z-index: 2147483645;
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(44, 39, 33, 0.22);
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      animation: installPulse 2s ease-in-out infinite;
    }

    @keyframes installPulse {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>

  <script>
    (function () {
      var bootGuardTimer = 0;
      var bootReady = false;
      var installPromptEvent = null;
      var startInvoked = false;

      function showBootFallback(reason) {
        try {
          if (bootReady) return;
          var root = document.getElementById('boot-fallback');
          if (!root) return;
          if (root.style.display === 'flex') return;
          root.style.display = 'flex';
          var msg = root.querySelector('[data-role=\"message\"]');
          if (msg && reason) msg.textContent = reason;
        } catch (_) {}
      }

      function hideBootFallback() {
        try {
          var root = document.getElementById('boot-fallback');
          if (!root) return;
          root.style.display = 'none';
        } catch (_) {}
      }

      function hideBootSplash() {
        try {
          var splash = document.getElementById('boot-splash');
          if (!splash) return;
          splash.classList.add('hidden');
          setTimeout(function () {
            splash.style.display = 'none';
          }, 260);
        } catch (_) {}
      }

      function markBootReady() {
        if (bootReady) return;
        bootReady = true;
        if (bootGuardTimer) {
          clearTimeout(bootGuardTimer);
          bootGuardTimer = 0;
        }
        hideBootSplash();
        hideBootFallback();
      }

      function showInstallFab() {
        var btn = document.getElementById('install-fab');
        if (!btn) return;
        btn.style.display = 'inline-flex';
      }

      function hideInstallFab() {
        var btn = document.getElementById('install-fab');
        if (!btn) return;
        btn.style.display = 'none';
      }

      async function promptInstall() {
        if (!installPromptEvent) return;
        try {
          installPromptEvent.prompt();
          await installPromptEvent.userChoice;
        } catch (_) {
          // noop
        } finally {
          installPromptEvent = null;
          hideInstallFab();
        }
      }

      var swWaitingRegistration = null;
      var swReloadOnControllerChange = false;

      function showUpdateBanner(message) {
        var root = document.getElementById('update-banner');
        var msg = document.getElementById('update-banner-message');
        if (!root || !msg) return;
        msg.textContent = message || 'Nueva versión disponible.';
        root.style.display = 'flex';
      }

      function hideUpdateBanner() {
        var root = document.getElementById('update-banner');
        if (!root) return;
        root.style.display = 'none';
      }

      async function clearCachesAndReload() {
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              try { await regs[i].unregister(); } catch (_) {}
            }
          }
        } catch (_) {}

        try {
          if (window.caches && caches.keys) {
            var keys = await caches.keys();
            for (var j = 0; j < keys.length; j++) {
              try { await caches.delete(keys[j]); } catch (_) {}
            }
          }
        } catch (_) {}

        try {
          window.location.reload();
        } catch (_) {}
      }

      async function applyWaitingServiceWorker() {
        var reg = swWaitingRegistration;
        if (!reg) {
          await clearCachesAndReload();
          return;
        }
        swReloadOnControllerChange = true;
        try {
          if (reg.waiting) {
            reg.waiting.postMessage('skipWaiting');
          } else {
            await reg.update();
          }
        } catch (_) {
          await clearCachesAndReload();
          return;
        }

        setTimeout(function () {
          if (!swReloadOnControllerChange) return;
          clearCachesAndReload();
        }, 1500);
      }

      function onServiceWorkerWaiting(reg) {
        swWaitingRegistration = reg;
        showUpdateBanner('Nueva versión disponible. Actualiza para aplicar cambios.');
      }

      function bindServiceWorkerRegistration(reg) {
        if (!reg) return;

        if (reg.waiting) {
          onServiceWorkerWaiting(reg);
        }

        reg.addEventListener('updatefound', function () {
          var worker = reg.installing;
          if (!worker) return;
          worker.addEventListener('statechange', function () {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              onServiceWorkerWaiting(reg);
            }
          });
        });
      }

      async function hardenServiceWorkerUpdates(build) {
        if (!('serviceWorker' in navigator)) return;

        try {
          navigator.serviceWorker.addEventListener('controllerchange', function () {
            if (!swReloadOnControllerChange) return;
            swReloadOnControllerChange = false;
            window.location.reload();
          });
        } catch (_) {}

        try {
          var swUrl = 'flutter_service_worker.js?v=' + encodeURIComponent(build);
          var reg = await navigator.serviceWorker.register(swUrl, {
            updateViaCache: 'none'
          });
          bindServiceWorkerRegistration(reg);
        } catch (_) {
          // fallback: registration handled by Flutter loader.
        }

        try {
          var regs = await navigator.serviceWorker.getRegistrations();
          for (var i = 0; i < regs.length; i++) {
            var r = regs[i];
            bindServiceWorkerRegistration(r);
            try { await r.update(); } catch (_) {}
          }
        } catch (_) {}
      }

      async function resolveBuildId() {
        try {
          var res = await fetch('version.json?x=' + Date.now(), {
            cache: 'no-store'
          });
          if (res.ok) {
            var json = await res.json();
            if (json && typeof json === 'object') {
              var fromVersion = (json.buildId || json.gitSha || json.buildTime || '')
                .toString()
                .trim();
              if (fromVersion) return fromVersion;
            }
          }
        } catch (_) {}

        var m = document.querySelector('meta[name="bitflow-build"]');
        var v = m ? (m.getAttribute('content') || '') : '';
        if (v && v !== '__BUILD_ID__') return v;
        return 'dev-' + Date.now();
      }

      async function resolveBuildIdFast(timeoutMs) {
        try {
          return await Promise.race([
            resolveBuildId(),
            new Promise(function (resolve) {
              setTimeout(function () {
                resolve('dev-' + Date.now());
              }, timeoutMs);
            }),
          ]);
        } catch (_) {
          return 'dev-' + Date.now();
        }
      }

      // Build badge moved to Flutter widget (_BuildBadge).

      // Mata SW/caches cuando cambia BUILD (para que iOS deje de servir cosas viejas)
      async function nukeCachesIfBuildChanged(build) {
        var key = 'bitflow_last_build';
        var last = null;
        try { last = localStorage.getItem(key); } catch (_) {}

        if (last === build) return;
        try { localStorage.setItem(key, build); } catch (_) {}

        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              try { await regs[i].unregister(); } catch (_) {}
            }
          }
        } catch (_) {}

        try {
          if (window.caches && caches.keys) {
            var names = await caches.keys();
            for (var j = 0; j < names.length; j++) {
              try { await caches.delete(names[j]); } catch (_) {}
            }
          }
        } catch (_) {}
      }

      function loadFlutterBootstrap(build) {
        try {
          var script = document.createElement('script');
          script.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(build);
          script.async = true;
          script.onload = function () {
            // El script cargo; el guard se desactiva al montar flt-glass-pane.
          };
          script.onerror = function () {
            showBootFallback('No se pudo cargar la app. Reintenta o abre la landing.');
          };
          document.body.appendChild(script);
        } catch (_) {}
      }

      function loadFlutterBootstrapDeferred(build) {
        var startLoad = function () {
          loadFlutterBootstrap(build);
        };
        if ('requestIdleCallback' in window) {
          window.requestIdleCallback(startLoad, { timeout: 1200 });
        } else {
          setTimeout(startLoad, 120);
        }
      }

      // iOS Safari keyboard fix: “pega” los roots de Flutter al visualViewport
      var raf = 0;
      var lastH = -1, lastTop = -1;
      var lastKick = 0;

      function applyViewport() {
        raf = 0;

        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        var top = vv ? vv.offsetTop : 0;

        if (!h) return;
        if (Math.abs(h - lastH) < 0.5 && Math.abs(top - lastTop) < 0.5) return;
        lastH = h; lastTop = top;

        document.documentElement.style.setProperty('--app-h', h + 'px');

        var nodes = document.querySelectorAll(
          'flt-glass-pane, flt-text-editing-host, flt-semantics-host, flt-announcement-host'
        );

        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          n.style.position = 'fixed';
          n.style.left = '0';
          n.style.right = '0';
          n.style.top = '0';
          n.style.width = '100%';
          n.style.height = h + 'px';
          n.style.transform = 'translateY(' + top + 'px)';
          n.style.transformOrigin = '0 0';
          n.style.willChange = 'transform,height';
        }

        // “patadita” a Flutter: fuerza recálculo cuando iOS se hace el distraído
        try {
          var now = Date.now();
          if (now - lastKick > 120) {
            lastKick = now;
            window.dispatchEvent(new Event('resize'));
          }
        } catch (_) {}
      }

      function scheduleApply() {
        if (raf) return;
        raf = requestAnimationFrame(applyViewport);
      }

      function boot() {
        scheduleApply();

        window.addEventListener('resize', scheduleApply, { passive: true });
        window.addEventListener('orientationchange', scheduleApply, { passive: true });
        document.addEventListener('focusin', scheduleApply, true);
        document.addEventListener('focusout', scheduleApply, true);

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', scheduleApply, { passive: true });
          window.visualViewport.addEventListener('scroll', scheduleApply, { passive: true });
        }

        try {
          new MutationObserver(function () {
            scheduleApply();
            if (document.querySelector('flt-glass-pane')) {
              markBootReady();
            }
          }).observe(document.documentElement, { childList: true, subtree: true });
        } catch (_) {}
      }

      async function start() {
        if (startInvoked) return;
        startInvoked = true;
        bootGuardTimer = setTimeout(function () {
          showBootFallback('Arranque demorado. Puedes reintentar sin perder estado local.');
        }, 12000);

        try {
          var build = await resolveBuildIdFast(1200);
          window.__BITFLOW_BUILD__ = build;
          boot();
          Promise.resolve()
            .then(function () {
              return nukeCachesIfBuildChanged(build);
            })
            .then(function () {
              return hardenServiceWorkerUpdates(build);
            })
            .catch(function () {});
          loadFlutterBootstrapDeferred(build);
        } catch (_) {
          var fallback = 'dev-' + Date.now();
          window.__BITFLOW_BUILD__ = fallback;
          boot();
          Promise.resolve()
            .then(function () {
              return hardenServiceWorkerUpdates(fallback);
            })
            .catch(function () {});
          loadFlutterBootstrapDeferred(fallback);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }

      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        installPromptEvent = event;
        showInstallFab();
      });

      window.addEventListener('appinstalled', function () {
        installPromptEvent = null;
        hideInstallFab();
      });

      window.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('install-fab');
        if (btn) {
          btn.addEventListener('click', function () {
            promptInstall();
          });
        }

        var updateBtn = document.getElementById('update-banner-refresh');
        if (updateBtn) {
          updateBtn.addEventListener('click', function () {
            applyWaitingServiceWorker();
          });
        }

        var dismissBtn = document.getElementById('update-banner-dismiss');
        if (dismissBtn) {
          dismissBtn.addEventListener('click', function () {
            hideUpdateBanner();
          });
        }
      });
    })();
  </script>
</head>

<body>
  <div id="boot-splash" aria-live="polite">
    <div class="shell">
      <div class="logo">B</div>
      <h1>BitFlow</h1>
      <p>Preparando tu espacio de trabajo operativo...</p>
    </div>
  </div>

  <div id="update-banner" aria-live="polite">
    <span id="update-banner-message">Nueva versión disponible.</span>
    <span class="actions">
      <button id="update-banner-refresh" class="primary" type="button">Actualizar</button>
      <button id="update-banner-dismiss" type="button">Luego</button>
    </span>
  </div>

  <div id="boot-fallback" aria-live="polite">
    <div class="card">
      <h2>BitFlow inicio seguro</h2>
      <p data-role="message">La app tarda mas de lo normal en iniciar.</p>
      <div class="row">
        <button class="primary" type="button" onclick="window.location.reload()">Reintentar app</button>
        <a href="bitflow/">Abrir landing premium</a>
      </div>
    </div>
  </div>
  <button id="install-fab" type="button" aria-label="Instalar BitFlow">Instalar BitFlow</button>
  <!-- flutter_bootstrap.js se inyecta dinámicamente con buildId -->
</body>
</html>
