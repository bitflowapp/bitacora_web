<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <base href="$FLUTTER_BASE_HREF" />

    <title>Bit Flow — Planilla tipo Excel para campo</title>
    <meta name="description" content="Planilla tipo Excel para campo: mediciones, fotos, GPS y exportación XLSX real." />
    <meta name="robots" content="index,follow" />

    <!-- BUILD ID: CAMBIAR EN CADA DEPLOY (lo estampa GitHub Actions en build/web/index.html) -->
    <meta name="bitflow-build" content="__BUILD_ID__" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bit Flow" />
    <meta name="application-name" content="Bit Flow" />
    <meta name="theme-color" content="#0A84FF" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="shortcut icon" type="image/png" href="favicon.png" />

    <style>
        :root { --app-height: 100vh; }

        html {
          height: 100%;
          width: 100%;
          margin: 0;
          overflow: hidden;
          overscroll-behavior: none;
          background: #FFFFFF;
          -webkit-text-size-adjust: 100%;
          touch-action: manipulation;
        }

        body {
          width: 100%;
          margin: 0;
          overflow: hidden;
          background: #FFFFFF;

          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: var(--app-height);
        }

        * { -webkit-tap-highlight-color: transparent; }

        #build-badge {
          position: fixed;
          right: 10px;
          bottom: 10px;
          z-index: 2147483647;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
          font-size: 12px;
          line-height: 1;
          padding: 6px 10px;
          border-radius: 999px;
          background: rgba(0,0,0,0.72);
          color: #fff;
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          user-select: none;
          pointer-events: none;
        }
    </style>

    <script>
        (function () {
          function getBuildId() {
            var m = document.querySelector('meta[name="bitflow-build"]');
            var v = m ? (m.getAttribute('content') || '') : '';
            return (v && v !== '__BUILD_ID__') ? v : ('dev-' + Date.now());
          }

          var BUILD = getBuildId();
          window.__BITFLOW_BUILD__ = BUILD;

          function mountBadge() {
            try {
              var el = document.getElementById('build-badge');
              if (!el) {
                el = document.createElement('div');
                el.id = 'build-badge';
                document.body.appendChild(el);
              }
              el.textContent = 'build ' + BUILD;
            } catch (_) {}
          }

          // iOS: fija altura real usando visualViewport (SIN loops / storms).
          function iosViewportFixSafe() {
            var root = document.documentElement;
            var lastH = -1;
            var raf = 0;

            function getHeight() {
              var vv = window.visualViewport;
              return vv ? vv.height : window.innerHeight;
            }

            function apply() {
              var h = getHeight();
              if (Math.abs(h - lastH) > 0.5) {
                lastH = h;
                root.style.setProperty('--app-height', h + 'px');
              }
            }

            function schedule() {
              if (raf) return;
              raf = requestAnimationFrame(function () {
                raf = 0;
                apply();
              });
            }

            apply();

            window.addEventListener('resize', schedule, { passive: true });
            window.addEventListener('orientationchange', schedule, { passive: true });
            window.addEventListener('pageshow', schedule, { passive: true });

            if (window.visualViewport) {
              window.visualViewport.addEventListener('resize', schedule, { passive: true });
              window.visualViewport.addEventListener('scroll', schedule, { passive: true });
            }

            window.addEventListener('focusin', schedule, true);
            window.addEventListener('focusout', schedule, true);
          }

          // Limpia SW + caches SOLO cuando cambia BUILD (por si antes tuviste PWA/caché pegajosa)
          async function nukeCachesIfBuildChanged() {
            var key = 'bitflow_last_build';
            var last = null;
            try { last = localStorage.getItem(key); } catch (_) {}

            if (last === BUILD) return;
            try { localStorage.setItem(key, BUILD); } catch (_) {}

            // Unregister SW
            try {
              if ('serviceWorker' in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                for (var i = 0; i < regs.length; i++) {
                  try { await regs[i].unregister(); } catch (_) {}
                }
              }
            } catch (_) {}

            // Clear Cache Storage
            try {
              if (window.caches && caches.keys) {
                var names = await caches.keys();
                for (var j = 0; j < names.length; j++) {
                  try { await caches.delete(names[j]); } catch (_) {}
                }
              }
            } catch (_) {}
          }

          function loadScript(src) {
            return new Promise(function (resolve, reject) {
              try {
                var s = document.createElement('script');
                s.src = src;
                s.defer = true;
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
              } catch (e) { reject(e); }
            });
          }

          // Cache-bust REAL al entrypoint
          async function bootFlutter() {
            await loadScript('flutter.js?v=' + encodeURIComponent(BUILD));

            var cfg = {
              entrypointUrl: 'main.dart.js?v=' + encodeURIComponent(BUILD),
              serviceWorker: { serviceWorkerVersion: null }
            };

            if (window._flutter && _flutter.loader && _flutter.loader.loadEntrypoint) {
              _flutter.loader.loadEntrypoint(cfg)
                .then(function (engineInitializer) { return engineInitializer.initializeEngine(); })
                .then(function (appRunner) { return appRunner.runApp(); });
              return;
            }

            console.error('Flutter loader no encontrado. Revisá build/web.');
          }

          document.addEventListener('DOMContentLoaded', function () {
            mountBadge();
            iosViewportFixSafe();

            nukeCachesIfBuildChanged()
              .catch(function(){})
              .finally(function () {
                bootFlutter().catch(function(){});
                loadScript('interop.js?v=' + encodeURIComponent(BUILD)).catch(function(){});
              });
          });
        })();
    </script>
</head>

<body></body>
</html>
