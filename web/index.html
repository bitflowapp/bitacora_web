<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF" />

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

  <!-- iOS + Android: viewport correcto y resize en teclado -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />

  <title>Bitacora Web — Operaciones con evidencias</title>
  <meta name="description" content="Bitacora operativa offline con evidencias, adjuntos y exportacion lista para auditorias." />
  <meta name="robots" content="index,follow" />

  <!-- BUILD ID fallback (si version.json no está disponible) -->
  <meta name="bitflow-build" content="__BUILD_ID__" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bitacora Web" />
  <meta name="application-name" content="Bitacora Web" />
  <meta name="theme-color" content="#0A84FF" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root { --app-h: 100vh; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;            /* clave: Safari no scrollea el documento */
      overscroll-behavior: none;
      background: #FFFFFF;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
      height: var(--app-h);
      background: #FFFFFF;
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* iOS Safari: evita zoom al enfocar input “invisible” de Flutter */
    input, textarea, select { font-size: 16px !important; }

    #build-badge {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 2147483647;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 12px;
      line-height: 1;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      pointer-events: none;
    }

    #app-loading-shell {
      position: fixed;
      inset: 0;
      z-index: 2147483000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FFFFFF;
      color: #0F172A;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      letter-spacing: 0.2px;
      transition: opacity 160ms ease;
    }

    #app-loading-shell.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>

  <script>
    (function () {
      async function resolveBuildId() {
        try {
          var res = await fetch('version.json?x=' + Date.now(), {
            cache: 'no-store'
          });
          if (res.ok) {
            var json = await res.json();
            if (json && typeof json === 'object') {
              var fromVersion = (json.buildId || json.gitSha || json.buildTime || '')
                .toString()
                .trim();
              if (fromVersion) return fromVersion;
            }
          }
        } catch (_) {}

        var m = document.querySelector('meta[name="bitflow-build"]');
        var v = m ? (m.getAttribute('content') || '') : '';
        if (v && v !== '__BUILD_ID__') return v;
        return 'dev-' + Date.now();
      }

      function mountBadge(build) {
        var qp = new URLSearchParams(window.location.search);
        if (qp.get('debug') !== '1') return;
        try {
          var el = document.getElementById('build-badge');
          if (!el) {
            el = document.createElement('div');
            el.id = 'build-badge';
            document.body.appendChild(el);
          }
          el.textContent = 'build ' + build;
        } catch (_) {}
      }

      function hideLoadingShell() {
        try {
          var shell = document.getElementById('app-loading-shell');
          if (!shell) return;
          shell.classList.add('hidden');
          setTimeout(function () {
            try { shell.remove(); } catch (_) {}
          }, 180);
        } catch (_) {}
      }

      // Mata SW/caches cuando cambia BUILD (para que iOS deje de servir cosas viejas)
      async function nukeCachesIfBuildChanged(build) {
        var key = 'bitflow_last_build';
        var last = null;
        try { last = localStorage.getItem(key); } catch (_) {}

        if (last === build) return;
        try { localStorage.setItem(key, build); } catch (_) {}

        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              try { await regs[i].unregister(); } catch (_) {}
            }
          }
        } catch (_) {}

        try {
          if (window.caches && caches.keys) {
            var names = await caches.keys();
            for (var j = 0; j < names.length; j++) {
              try { await caches.delete(names[j]); } catch (_) {}
            }
          }
        } catch (_) {}
      }

      function loadFlutterBootstrap(build) {
        try {
          var qp = new URLSearchParams(window.location.search);
          var swDisabled = qp.get('sw') === '0';
          if (swDisabled) window.__BITFLOW_SW_DISABLED__ = true;
          var script = document.createElement('script');
          script.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(build) + (swDisabled ? '&sw=0' : '');
          script.async = true;
          document.body.appendChild(script);
        } catch (_) {}
      }

      async function disableServiceWorkerForDebug() {
        try {
          var qp = new URLSearchParams(window.location.search);
          if (qp.get('sw') !== '0') return;

          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              try { await regs[i].unregister(); } catch (_) {}
            }
          }
        } catch (_) {}
      }

      // iOS Safari keyboard fix: “pega” los roots de Flutter al visualViewport
      var raf = 0;
      var lastH = -1, lastTop = -1;
      var lastKick = 0;

      function applyViewport() {
        raf = 0;

        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        var top = vv ? vv.offsetTop : 0;

        if (!h) return;
        if (Math.abs(h - lastH) < 0.5 && Math.abs(top - lastTop) < 0.5) return;
        lastH = h; lastTop = top;

        document.documentElement.style.setProperty('--app-h', h + 'px');

        var nodes = document.querySelectorAll(
          'flt-glass-pane, flt-text-editing-host, flt-semantics-host, flt-announcement-host'
        );

        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          n.style.position = 'fixed';
          n.style.left = '0';
          n.style.right = '0';
          n.style.top = '0';
          n.style.width = '100%';
          n.style.height = h + 'px';
          n.style.transform = 'translateY(' + top + 'px)';
          n.style.transformOrigin = '0 0';
          n.style.willChange = 'transform,height';
        }

        if (document.querySelector('flt-glass-pane')) {
          hideLoadingShell();
        }

        // “patadita” a Flutter: fuerza recálculo cuando iOS se hace el distraído
        try {
          var now = Date.now();
          if (now - lastKick > 120) {
            lastKick = now;
            window.dispatchEvent(new Event('resize'));
          }
        } catch (_) {}
      }

      function scheduleApply() {
        if (raf) return;
        raf = requestAnimationFrame(applyViewport);
      }

      function boot() {
        scheduleApply();

        window.addEventListener('resize', scheduleApply, { passive: true });
        window.addEventListener('orientationchange', scheduleApply, { passive: true });
        document.addEventListener('focusin', scheduleApply, true);
        document.addEventListener('focusout', scheduleApply, true);

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', scheduleApply, { passive: true });
          window.visualViewport.addEventListener('scroll', scheduleApply, { passive: true });
        }

        try {
          new MutationObserver(scheduleApply).observe(document.documentElement, { childList: true, subtree: true });
        } catch (_) {}
      }

      async function start() {
        try {
          var build = await resolveBuildId();
          window.__BITFLOW_BUILD__ = build;
          await disableServiceWorkerForDebug();
          await nukeCachesIfBuildChanged(build);
          mountBadge(build);
          boot();
          loadFlutterBootstrap(build);
        } catch (_) {
          var fallback = 'dev-' + Date.now();
          window.__BITFLOW_BUILD__ = fallback;
          await disableServiceWorkerForDebug();
          mountBadge(fallback);
          boot();
          loadFlutterBootstrap(fallback);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start);
      } else {
        start();
      }
    })();
  </script>
</head>

<body>
  <div id="app-loading-shell">
    <div>Cargando Bit Flow...</div>
  </div>
  <!-- flutter_bootstrap.js se inyecta dinámicamente con buildId -->
</body>
</html>
