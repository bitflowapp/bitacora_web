<!DOCTYPE html>
<html lang="es">
<head>
  <base href="/bitacora_web/" />

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

  <!-- iOS: viewport correcto -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Bit Flow â€” Planilla tipo Excel para campo</title>
  <meta name="description" content="Planilla tipo Excel para campo: mediciones, fotos, GPS y exportaciÃ³n XLSX real." />
  <meta name="robots" content="index,follow" />

  <!-- BUILD ID (lo reemplazÃ¡s en /docs despuÃ©s del robocopy) -->
  <meta name="bitflow-build" content="20251231-023746" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Bit Flow" />
  <meta name="application-name" content="Bit Flow" />
  <meta name="theme-color" content="#0A84FF" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png" />

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />

  <style>
    :root { --app-h: 100vh; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;            /* clave: Safari no scrollea el documento */
      overscroll-behavior: none;
      background: #FFFFFF;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
      height: var(--app-h);
      background: #FFFFFF;
    }

    * { -webkit-tap-highlight-color: transparent; }

    /* iOS Safari: evita zoom al enfocar input â€œinvisibleâ€ de Flutter */
    input, textarea, select { font-size: 16px !important; }

    #build-badge {
      position: fixed;
      right: 10px;
      bottom: 10px;
      z-index: 2147483647;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 12px;
      line-height: 1;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: #fff;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      user-select: none;
      pointer-events: none;
    }
  </style>

  <script>
    (function () {
      function getBuildId() {
        var m = document.querySelector('meta[name="bitflow-build"]');
        var v = m ? (m.getAttribute('content') || '') : '';
        return (v && v !== '20251231-023746') ? v : ('dev-' + Date.now());
      }

      var BUILD = getBuildId();
      window.__BITFLOW_BUILD__ = BUILD;

      function mountBadge() {
        try {
          var el = document.getElementById('build-badge');
          if (!el) {
            el = document.createElement('div');
            el.id = 'build-badge';
            document.body.appendChild(el);
          }
          el.textContent = 'build ' + BUILD;
        } catch (_) {}
      }

      // Mata SW/caches cuando cambia BUILD (para que iOS deje de servir cosas viejas)
      async function nukeCachesIfBuildChanged() {
        var key = 'bitflow_last_build';
        var last = null;
        try { last = localStorage.getItem(key); } catch (_) {}

        if (last === BUILD) return;
        try { localStorage.setItem(key, BUILD); } catch (_) {}

        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            for (var i = 0; i < regs.length; i++) {
              try { await regs[i].unregister(); } catch (_) {}
            }
          }
        } catch (_) {}

        try {
          if (window.caches && caches.keys) {
            var names = await caches.keys();
            for (var j = 0; j < names.length; j++) {
              try { await caches.delete(names[j]); } catch (_) {}
            }
          }
        } catch (_) {}
      }

      // iOS Safari keyboard fix: â€œpegaâ€ los roots de Flutter al visualViewport
      var raf = 0;
      var lastH = -1, lastTop = -1;
      var lastKick = 0;

      function applyViewport() {
        raf = 0;

        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        var top = vv ? vv.offsetTop : 0;

        if (!h) return;
        if (Math.abs(h - lastH) < 0.5 && Math.abs(top - lastTop) < 0.5) return;
        lastH = h; lastTop = top;

        document.documentElement.style.setProperty('--app-h', h + 'px');

        var nodes = document.querySelectorAll(
          'flt-glass-pane, flt-text-editing-host, flt-semantics-host, flt-announcement-host'
        );

        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          n.style.position = 'fixed';
          n.style.left = '0';
          n.style.right = '0';
          n.style.top = '0';
          n.style.width = '100%';
          n.style.height = h + 'px';
          n.style.transform = 'translateY(' + top + 'px)';
          n.style.transformOrigin = '0 0';
          n.style.willChange = 'transform,height';
        }

        // â€œpataditaâ€ a Flutter: fuerza recÃ¡lculo cuando iOS se hace el distraÃ­do
        try {
          var now = Date.now();
          if (now - lastKick > 120) {
            lastKick = now;
            window.dispatchEvent(new Event('resize'));
          }
        } catch (_) {}
      }

      function scheduleApply() {
        if (raf) return;
        raf = requestAnimationFrame(applyViewport);
      }

      function boot() {
        mountBadge();
        scheduleApply();

        window.addEventListener('resize', scheduleApply, { passive: true });
        window.addEventListener('orientationchange', scheduleApply, { passive: true });
        document.addEventListener('focusin', scheduleApply, true);
        document.addEventListener('focusout', scheduleApply, true);

        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', scheduleApply, { passive: true });
          window.visualViewport.addEventListener('scroll', scheduleApply, { passive: true });
        }

        try {
          new MutationObserver(scheduleApply).observe(document.documentElement, { childList: true, subtree: true });
        } catch (_) {}
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          nukeCachesIfBuildChanged().catch(function(){}).finally(boot);
        });
      } else {
        nukeCachesIfBuildChanged().catch(function(){}).finally(boot);
      }
    })();
  </script>
</head>

<body>
  <!-- Cache-bust real del bootstrap -->
  <script src="flutter_bootstrap.js?v=20251231-023746" async></script>
</body>
</html>
