<!DOCTYPE html>
<html lang="es">
<head>
    <!-- BITFLOW_KB_FIX_V2 -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">

    <!-- iOS: imprescindible -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Bit Flow — Planilla tipo Excel para campo</title>
    <meta name="description" content="Planilla tipo Excel para campo: mediciones, fotos, GPS y exportación XLSX real.">
    <meta name="robots" content="index,follow">

    <!-- BUILD ID (lo reemplazás en deploy) -->
    <meta name="bitflow-build" content="__BUILD_ID__">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Bit Flow">
    <meta name="application-name" content="Bit Flow">
    <meta name="theme-color" content="#0A84FF">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="shortcut icon" type="image/png" href="favicon.png">

    <style>
        :root { --app-height: 100vh; }

        html, body {
          width: 100%;
          height: 100%;
          margin: 0;
          padding: 0;
          overflow: hidden;               /* clave: que Safari NO scrollee el doc */
          overscroll-behavior: none;
          background: #FFFFFF;
          -webkit-text-size-adjust: 100%;
        }

        body {
          position: fixed;
          inset: 0;
          height: var(--app-height);
        }

        * { -webkit-tap-highlight-color: transparent; }

        /* iOS Safari: evita zoom al enfocar el input invisible de Flutter */
        input, textarea, select { font-size: 16px !important; }

        /* Evita el “scroll-to-hidden-input” de Flutter en iOS */
        flt-glass-pane,
        flt-text-editing-host,
        flt-semantics-host,
        flt-announcement-host {
          position: fixed !important;
          inset: 0 !important;
        }

        #build-badge {
          position: fixed;
          right: 10px;
          bottom: 10px;
          z-index: 2147483647;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
          font-size: 12px;
          line-height: 1;
          padding: 6px 10px;
          border-radius: 999px;
          background: rgba(0,0,0,0.72);
          color: #fff;
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          user-select: none;
          pointer-events: none;
        }
    </style>

    <script>
        (function () {
          function getBuildId() {
            var m = document.querySelector('meta[name="bitflow-build"]');
            var v = m ? (m.getAttribute('content') || '') : '';
            return (v && v !== '__BUILD_ID__') ? v : ('dev-' + Date.now());
          }

          var BUILD = getBuildId();
          window.__BITFLOW_BUILD__ = BUILD;

          function mountBadge() {
            try {
              var el = document.getElementById('build-badge');
              if (!el) {
                el = document.createElement('div');
                el.id = 'build-badge';
                document.body.appendChild(el);
              }
              el.textContent = 'build ' + BUILD;
            } catch (_) {}
          }

          var raf = 0;
          function applyViewport() {
            raf = 0;
            var vv = window.visualViewport;
            var h = vv ? vv.height : window.innerHeight;

            document.documentElement.style.setProperty('--app-height', h + 'px');

            // Safari a veces igual intenta “pan”: lo anulamos.
            try { window.scrollTo(0, 0); } catch (_) {}
            setTimeout(function(){ try { window.scrollTo(0,0); } catch(_){} }, 50);
          }

          function scheduleApply() {
            if (raf) return;
            raf = requestAnimationFrame(applyViewport);
          }

          async function nukeCachesIfBuildChanged() {
            var key = 'bitflow_last_build';
            var last = null;
            try { last = localStorage.getItem(key); } catch (_) {}

            if (last === BUILD) return;
            try { localStorage.setItem(key, BUILD); } catch (_) {}

            // iOS Safari es “creativo” con cachés/SW: los sacamos de la ecuación.
            try {
              if ('serviceWorker' in navigator) {
                var regs = await navigator.serviceWorker.getRegistrations();
                for (var i = 0; i < regs.length; i++) {
                  try { await regs[i].unregister(); } catch (_) {}
                }
              }
            } catch (_) {}

            try {
              if (window.caches && caches.keys) {
                var names = await caches.keys();
                for (var j = 0; j < names.length; j++) {
                  try { await caches.delete(names[j]); } catch (_) {}
                }
              }
            } catch (_) {}
          }

          function loadBootstrap() {
            return new Promise(function (resolve, reject) {
              try {
                var s = document.createElement('script');
                s.src = 'flutter_bootstrap.js?v=' + encodeURIComponent(BUILD);
                s.defer = true;
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
              } catch (e) { reject(e); }
            });
          }

          function boot() {
            mountBadge();
            scheduleApply();

            window.addEventListener('resize', scheduleApply, { passive: true });
            window.addEventListener('orientationchange', scheduleApply, { passive: true });
            document.addEventListener('focusin', scheduleApply, true);
            document.addEventListener('focusout', scheduleApply, true);

            if (window.visualViewport) {
              window.visualViewport.addEventListener('resize', scheduleApply, { passive: true });
              window.visualViewport.addEventListener('scroll', scheduleApply, { passive: true });
            }

            // Por si Flutter inserta hosts después
            try {
              var mo = new MutationObserver(scheduleApply);
              mo.observe(document.documentElement, { childList: true, subtree: true });
            } catch (_) {}

            nukeCachesIfBuildChanged()
              .catch(function(){})
              .finally(function () {
                loadBootstrap().catch(function (e) { console.error(e); });
              });
          }

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', boot);
          } else {
            boot();
          }
        })();
    </script>
</head>
<body></body>
</html>
