<!DOCTYPE html>
<html lang="es">
<head>
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- IMPORTANTE en iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Bit Flow — Planilla tipo Excel para campo</title>
    <meta name="description" content="Planilla tipo Excel para campo: mediciones, fotos, GPS y exportación XLSX real." />
    <meta name="robots" content="index,follow" />

    <!-- BUILD ID: lo estampás en tu deploy con replace -->
    <meta name="bitflow-build" content="__BUILD_ID__" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bit Flow" />
    <meta name="application-name" content="Bit Flow" />
    <meta name="theme-color" content="#0A84FF" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="shortcut icon" type="image/png" href="favicon.png" />

    <style>
        :root { --app-h: 100vh; }

        html, body {
          width: 100%;
          height: 100%;
          margin: 0;
          padding: 0;
          overflow: hidden;            /* clave: que Safari no scrollee el doc */
          overscroll-behavior: none;
          background: #FFFFFF;
          -webkit-text-size-adjust: 100%;
        }

        * { -webkit-tap-highlight-color: transparent; }

        /* iOS Safari: evita zoom al enfocar inputs invisibles (text-editing de Flutter) */
        input, textarea, select { font-size: 16px !important; }

        #build-badge {
          position: fixed;
          right: 10px;
          bottom: 10px;
          z-index: 2147483647;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
          font-size: 12px;
          line-height: 1;
          padding: 6px 10px;
          border-radius: 999px;
          background: rgba(0,0,0,0.72);
          color: #fff;
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
          user-select: none;
          pointer-events: none;
        }
    </style>

    <script>
        (function () {
          function getBuildId() {
            var m = document.querySelector('meta[name="bitflow-build"]');
            var v = m ? (m.getAttribute('content') || '') : '';
            return (v && v !== '__BUILD_ID__') ? v : ('dev-' + Date.now());
          }

          var BUILD = getBuildId();
          window.__BITFLOW_BUILD__ = BUILD;

          function mountBadge() {
            try {
              var el = document.getElementById('build-badge');
              if (!el) {
                el = document.createElement('div');
                el.id = 'build-badge';
                document.body.appendChild(el);
              }
              el.textContent = 'build ' + BUILD;
            } catch (_) {}
          }

          // ---- iOS keyboard fix (visualViewport pan) ----
          var raf = 0;
          var lastH = -1, lastTop = -1;

          function clamp0(x) { return x < 0 ? 0 : x; }

          function applyViewport() {
            raf = 0;
            var vv = window.visualViewport;
            var h = vv ? vv.height : window.innerHeight;
            var top = clamp0(vv ? vv.offsetTop : 0);

            if (Math.abs(h - lastH) < 0.5 && Math.abs(top - lastTop) < 0.5) return;
            lastH = h; lastTop = top;

            document.documentElement.style.setProperty('--app-h', h + 'px');

            // Mover TODOS los roots de Flutter (canvas + text editing + semantics) juntos
            var nodes = document.querySelectorAll(
              'flt-glass-pane, flt-text-editing-host, flt-semantics-host, flt-announcement-host'
            );

            for (var i = 0; i < nodes.length; i++) {
              var n = nodes[i];
              n.style.position = 'fixed';
              n.style.left = '0';
              n.style.right = '0';
              n.style.top = '0';
              n.style.height = h + 'px';
              n.style.transform = 'translateY(' + top + 'px)';
              n.style.transformOrigin = '0 0';
              n.style.willChange = 'transform,height';
            }
          }

          function scheduleApply() {
            if (raf) return;
            raf = requestAnimationFrame(applyViewport);
          }

          function boot() {
            mountBadge();
            scheduleApply();

            window.addEventListener('resize', scheduleApply, { passive: true });
            window.addEventListener('orientationchange', scheduleApply, { passive: true });
            document.addEventListener('focusin', scheduleApply, true);
            document.addEventListener('focusout', scheduleApply, true);

            if (window.visualViewport) {
              window.visualViewport.addEventListener('resize', scheduleApply, { passive: true });
              window.visualViewport.addEventListener('scroll', scheduleApply, { passive: true });
            }

            // Flutter inserta flt-* luego: observamos y aplicamos apenas aparezcan
            try {
              var mo = new MutationObserver(scheduleApply);
              mo.observe(document.documentElement, { childList: true, subtree: true });
            } catch (_) {}
          }

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', boot);
          } else {
            boot();
          }
        })();
    </script>
</head>

<body>
<!-- Cache-bust del bootstrap para iOS/Safari tercos -->
<script src="flutter_bootstrap.js?v=__BUILD_ID__" async></script>
</body>
</html>
