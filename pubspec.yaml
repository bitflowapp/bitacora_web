name: bitacora_web
description: "Bit Flow — Planillas dinámicas para ingenieros en campo. GPS, fotos, export Excel/PDF. Offline-first."
publish_to: "none"
version: 1.2.5+3

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Utilidades
  intl: 0.20.2
  collection: ^1.18.0
  image: ^4.2.0       # Para convertir HEIC/WEBP a JPEG en exportacion

  # Navegacion
  go_router: ^16.3.0

  # Estado / preferencias
  shared_preferences: ^2.3.2

  # Persistencia
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Syncfusion
  syncfusion_flutter_core: ^31.2.4
  syncfusion_flutter_datagrid: ^31.2.4
  syncfusion_flutter_xlsio: ^31.2.4
  pdf: ^3.11.3

  # Archivos / exportacion
  file_selector: ^1.0.4
  file_saver: ^0.3.1
  csv: ^6.0.0
  path: ^1.9.1
  path_provider: ^2.1.4
  archive: ^4.0.7

  # UX
  flutter_animate: ^4.5.2
  animations: ^2.0.11
  lottie: ^3.1.2
  url_launcher: ^6.3.2
  video_player: ^2.9.2
  record: ^6.2.0
  audioplayers: ^6.1.0

  # Compartir / correo
  share_plus: ^12.0.1
  flutter_email_sender: ^8.0.0

  # Voz a texto
  speech_to_text: ^7.3.0
  permission_handler: ^11.3.1

  # GPS / ubicacion
  geolocator: ^12.0.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # Diagnostico (opcional)
  sentry_flutter: ^9.7.0
  package_info_plus: ^9.0.0

  # HTTP / APIs
  http: ^1.5.0
  dio: ^5.9.0
  dio_web_adapter: ^2.1.1

  # Firebase (dejados solo si usas Firestore en otra parte)
  firebase_core: ^4.2.1
  cloud_firestore: ^6.1.0
  image_picker: ^1.2.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/version.json
    - assets/config.json
    - assets/config.example.json
    - assets/sfx/
    # - assets/video/gridnote_cells_loop.mp4
